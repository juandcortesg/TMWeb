<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexion | The Mandalorian</title>
    <meta name="theme-color" content="#f5a623">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Roboto, Arial, sans-serif;
            background: radial-gradient(circle at top, #1e1e1e 0%, #0d0d0d 60%);
            color: #f3f3f3;
        }

        .offline-card {
            max-width: 560px;
            padding: 32px;
            border: 1px solid #3a3a3a;
            border-radius: 18px;
            background: rgba(20, 20, 20, 0.96);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        h1 {
            color: #f5a623;
            font-size: 2rem;
            margin-bottom: 16px;
        }

        p {
            color: #d4d4d4;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        a {
            display: inline-block;
            margin-top: 8px;
            padding: 12px 20px;
            border-radius: 10px;
            background: #f5a623;
            color: #111;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <h1>Modo offline activo</h1>
        <p>La aplicacion no pudo acceder a internet en este momento.</p>
        <p>Si ya visitaste la pagina antes, el contenido principal deberia seguir disponible desde cache.</p>
        <a href="./index.html">Intentar de nuevo</a>
    </main>
</body>
</html>
